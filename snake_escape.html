<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Snake Escape</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  background:#f0ede8;color:#333;
  font-family:'Segoe UI',Arial,sans-serif;
  height:100dvh;display:flex;flex-direction:column;
  align-items:center;overflow:hidden;user-select:none;
}
#hud{
  width:100%;max-width:560px;
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 18px 6px;
}
#phase-lbl{font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#888}
#phase-lbl b{color:#333;font-size:18px}
#timer-col{display:flex;flex-direction:column;align-items:center;gap:3px}
#timer{font-size:28px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:2px}
#timer.red{color:#e74c3c;animation:blink .45s infinite alternate}
@keyframes blink{to{opacity:.3}}
#tbar-bg{width:80px;height:3px;background:#ddd;border-radius:2px}
#tbar{height:3px;background:#e74c3c;border-radius:2px;width:100%;transition:width 1s linear,background .4s}
#btn-restart{
  background:#fff;border:2px solid #ddd;color:#888;
  border-radius:50%;width:36px;height:36px;font-size:18px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;box-shadow:0 1px 4px #0001;
}
#btn-restart:active{transform:rotate(-45deg) scale(.9);}
#canvas-wrap{
  flex:1;display:flex;align-items:center;justify-content:center;
  width:100%;padding:6px 12px 10px;
}
canvas{display:block;touch-action:none;border-radius:12px;
  box-shadow:0 2px 16px #0002;background:#fff;}
.ov{
  position:fixed;inset:0;background:#f0ede8cc;backdrop-filter:blur(6px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;z-index:9;opacity:0;pointer-events:none;transition:opacity .3s;
}
.ov.show{opacity:1;pointer-events:all}
.ov h2{font-size:36px;font-weight:900;color:#333}
.ov p{color:#888;font-size:14px}
.btn{
  background:#4ECDC4;color:#fff;border:none;border-radius:30px;
  padding:12px 36px;font-size:15px;font-weight:700;letter-spacing:1px;
  cursor:pointer;transition:transform .12s,opacity .12s;box-shadow:0 3px 10px #4ECDC455;
}
.btn:active{transform:scale(.94);opacity:.85}
.btn2{background:#fff;color:#888;border:2px solid #ddd;box-shadow:none;margin-top:2px}
</style>
</head>
<body>
<div id="hud">
  <div id="phase-lbl">Fase <b id="pnum">1</b></div>
  <div id="timer-col">
    <div id="timer">2:00</div>
    <div id="tbar-bg"><div id="tbar"></div></div>
  </div>
  <button id="btn-restart">↺</button>
</div>
<div id="canvas-wrap"><canvas id="c"></canvas></div>

<div id="ov-win" class="ov">
  <h2>🎉 Escapou!</h2>
  <p id="win-msg">Todas as cobras fugiram!</p>
  <button class="btn" id="btn-next">Próxima Fase ▶</button>
  <button class="btn btn2" id="btn-retry">Jogar Novamente</button>
</div>
<div id="ov-lose" class="ov">
  <h2>⏱ Tempo!</h2>
  <p>As cobras ficaram presas...</p>
  <button class="btn" id="btn-retry2">Tentar Novamente</button>
</div>

<script>
// ── Cores (30 cores para muitas cobras) ────────────────────
const COLORS=[
  '#E8735A','#5AA8E8','#7ED87E','#F0B429','#A07AE8',
  '#5AD8C8','#E89A5A','#5A88D0','#B8E85A','#E85AB0',
  '#5AE8A0','#C05050','#50A0C8','#C8A050','#8050C8',
  '#E86080','#60C8A0','#C8C050','#50C8C8','#C86050',
  '#80A0E8','#E8A080','#80C860','#C860C0','#60A060',
  '#E860A0','#60C0E8','#A0E860','#E8C060','#9060A0',
];

// ── Config por fase: tier muda a cada 5 fases ──────────────
function cfg(p){
  if(p<1) p=1;
  const tier=Math.floor((p-1)/5);  // 0,1,2,3...
  const pos =(p-1)%5;              // 0-4 dentro do tier
  const R=Math.min(6+tier*2,12);
  const C=Math.min(7+tier*2,14);
  const maxLen=3+tier+Math.floor(pos/2);
  const maxSnakes=Math.min(10+tier*6+pos, Math.floor(R*C/2.2));
  return{R,C,maxLen,maxSnakes};
}

// ── Helpers ────────────────────────────────────────────────
function nbrs(r,c,R,C){
  return[[-1,0],[1,0],[0,-1],[0,1]]
    .map(([dr,dc])=>[r+dr,c+dc])
    .filter(([nr,nc])=>nr>=0&&nr<R&&nc>=0&&nc<C);
}
function onBorder(r,c,R,C){return r===0||r===R-1||c===0||c===C-1;}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=0|Math.random()*(i+1);[a[i],a[j]]=[a[j],a[i]];}return a;}
function key(r,c){return r*1000+c;}
function center(r,c,cs){return{x:c*cs+cs/2,y:r*cs+cs/2};}

// ── Walk: parte de qualquer célula, Warnsdorff ─────────────
function greedyWalk(start,grid,R,C,maxLen){
  const path=[start];
  grid[start[0]][start[1]]=-2;
  while(path.length<maxLen){
    const[r,c]=path[path.length-1];
    const free=shuffle(nbrs(r,c,R,C).filter(([nr,nc])=>grid[nr][nc]===-1));
    if(!free.length) break;
    free.sort((a,b)=>{
      const fa=nbrs(a[0],a[1],R,C).filter(([nr,nc])=>grid[nr][nc]===-1).length;
      const fb=nbrs(b[0],b[1],R,C).filter(([nr,nc])=>grid[nr][nc]===-1).length;
      return fa-fb;
    });
    path.push(free[0]);
    grid[free[0][0]][free[0][1]]=-2;
  }
  return path;
}

// ── Monta cobra: orienta path para que a saída seja na borda
function buildSnake(path,id,colorPool,grid,R,C){
  // Precisamos que rail[-1] (cabeça) seja borda para poder sair
  const p0=path[0], pN=path[path.length-1];
  let finalPath=null;
  if(onBorder(pN[0],pN[1],R,C))      finalPath=path;
  else if(onBorder(p0[0],p0[1],R,C)) finalPath=[...path].reverse();
  else return null; // nem uma ponta está na borda → descarta

  const n=finalPath.length;
  const dr=finalPath[n-1][0]-finalPath[n-2][0];
  const dc=finalPath[n-1][1]-finalPath[n-2][1];
  const rail=[...finalPath];
  for(let v=1;v<=n;v++) rail.push([finalPath[n-1][0]+dr*v,finalPath[n-1][1]+dc*v]);

  for(const[r,c] of finalPath) grid[r][c]=id;
  return{id,color:colorPool[id%colorPool.length],rail,bodyLen:n,headIdx:n-1,exited:false,_anim:null};
}

// ── Gerador principal ──────────────────────────────────────
function generateLevel(phase){
  const{R,C,maxLen,maxSnakes}=cfg(phase);

  for(let attempt=0;attempt<50;attempt++){
    const grid=Array.from({length:R},()=>Array(C).fill(-1));
    const snakes=[];
    const colorPool=shuffle([...COLORS]);

    // Candidatos: borda primeiro, depois interior
    const border=[], interior=[];
    for(let r=0;r<R;r++) for(let c=0;c<C;c++)
      (onBorder(r,c,R,C)?border:interior).push([r,c]);

    const candidates=[...shuffle(border),...shuffle(interior)];

    for(const start of candidates){
      if(snakes.length>=maxSnakes) break;
      if(grid[start[0]][start[1]]!==-1) continue;

      const path=greedyWalk(start,grid,R,C,maxLen);
      if(path.length<2){
        for(const[r,c] of path) grid[r][c]=-1;
        continue;
      }

      const sn=buildSnake(path,snakes.length,colorPool,grid,R,C);
      if(!sn){
        for(const[r,c] of path) grid[r][c]=-1;
        continue;
      }
      snakes.push(sn);
    }

    if(snakes.length<3) continue;
    if(solvable(snakes,R,C)) return{snakes,R,C,phase};
  }
  return fallback(phase);
}

function fallback(phase){
  const{R,C}=cfg(phase);
  const grid=Array.from({length:R},()=>Array(C).fill(-1));
  const snakes=[];
  const border=[];
  for(let r=0;r<R;r++) for(let c=0;c<C;c++) if(onBorder(r,c,R,C)) border.push([r,c]);
  shuffle(border);
  for(let id=0;id<4&&border.length;id++){
    const start=border.shift();
    if(grid[start[0]][start[1]]!==-1) continue;
    const path=greedyWalk(start,grid,R,C,4);
    if(path.length<2) continue;
    const sn=buildSnake(path,id,[...COLORS],grid,R,C);
    if(sn) snakes.push(sn);
  }
  return{snakes,R,C,phase};
}

// ── Solver: greedy auto-slide — detecta deadlocks face-a-face
function bodyOf(sn){
  const s=Math.max(0,sn.headIdx-sn.bodyLen+1);
  return sn.rail.slice(s,sn.headIdx+1);
}
function inGrid(r,c,R,C){return r>=0&&r<R&&c>=0&&c<C;}

function solvable(snakes,R,C){
  const n=snakes.length;
  const heads=snakes.map(s=>s.headIdx);
  const rails=snakes.map(s=>s.rail);
  const bls=snakes.map(s=>s.bodyLen);

  function occMap(){
    const m=new Map();
    for(let i=0;i<n;i++){
      const hi=heads[i];
      for(let j=Math.max(0,hi-bls[i]+1);j<=hi;j++){
        const[r,c]=rails[i][j];
        if(inGrid(r,c,R,C)) m.set(key(r,c),i);
      }
    }
    return m;
  }

  // Greedy: repete movimentos enquanto progredir
  let changed=true, iters=0;
  while(changed&&iters++<2000){
    changed=false;
    for(let i=0;i<n;i++){
      if(heads[i]>=rails[i].length-1) continue;
      const ni=heads[i]+1;
      const[nr,nc]=rails[i][ni];
      if(!inGrid(nr,nc,R,C)){heads[i]=ni;changed=true;continue;}
      const om=occMap();
      if(!om.has(key(nr,nc))||om.get(key(nr,nc))===i){heads[i]=ni;changed=true;}
    }
  }
  return heads.every((h,i)=>h>=rails[i].length-1);
}

// ── Estado do jogo ─────────────────────────────────────────
const G={canvas:null,ctx:null,snakes:[],R:4,C:4,cs:80,phase:1,
         timer:120,timerMax:120,timerH:null,win:false,lose:false,
         flashId:-1,flashFrames:0};

// ── Iniciar fase ───────────────────────────────────────────
function startPhase(phase){
  clearInterval(G.timerH);
  hide('ov-win');hide('ov-lose');
  const lv=generateLevel(phase);
  G.snakes=lv.snakes;G.R=lv.R;G.C=lv.C;G.phase=phase;
  G.win=false;G.lose=false;G.flashId=-1;

  const maxW=Math.min(window.innerWidth-24,560);
  const maxH=window.innerHeight-110;
  G.cs=Math.min(maxW/G.C, maxH/G.R, 72);
  G.canvas.width=G.C*G.cs;G.canvas.height=G.R*G.cs;
  document.getElementById('pnum').textContent=phase;

  G.timer=120;G.timerMax=120;
  updateTimer();
  G.timerH=setInterval(()=>{
    if(G.win||G.lose) return;
    G.timer=Math.max(0,G.timer-1);
    updateTimer();
    if(G.timer===0){clearInterval(G.timerH);G.lose=true;show('ov-lose');}
  },1000);
  render();
}

function updateTimer(){
  const m=0|G.timer/60,s=G.timer%60;
  const el=document.getElementById('timer');
  el.textContent=`${m}:${String(s).padStart(2,'0')}`;
  el.classList.toggle('red',G.timer<=20);
  const bar=document.getElementById('tbar');
  bar.style.width=(G.timer/G.timerMax*100)+'%';
  bar.style.background=G.timer/G.timerMax>.4?'#4ECDC4':'#e74c3c';
}

// ── Input ──────────────────────────────────────────────────
function onTap(e){
  e.preventDefault();
  if(G.win||G.lose) return;
  const rect=G.canvas.getBoundingClientRect();
  const t=e.touches?e.touches[0]:e;
  const px=(t.clientX-rect.left)*G.canvas.width/rect.width;
  const py=(t.clientY-rect.top)*G.canvas.height/rect.height;

  let minD=Infinity,hit=null;
  for(const sn of G.snakes){
    if(sn.exited) continue;
    for(const[r,c] of bodyOf(sn)){
      const p=center(r,c,G.cs);
      const d=Math.hypot(p.x-px,p.y-py);
      if(d<minD){minD=d;hit=sn;}
    }
  }
  if(hit&&minD<G.cs*.75) tryMove(hit);
}

function occMap(){
  const m=new Map();
  for(const sn of G.snakes){
    if(sn.exited) continue;
    for(const[r,c] of bodyOf(sn)) m.set(key(r,c),sn.id);
  }
  return m;
}

function tryMove(sn){
  if(sn._anim) return;
  const ni=sn.headIdx+1;
  if(ni>=sn.rail.length){sn.exited=true;checkWin();render();return;}
  const[nr,nc]=sn.rail[ni];
  const off=!inGrid(nr,nc,G.R,G.C);
  const om=occMap();
  if(!off&&om.has(key(nr,nc))&&om.get(key(nr,nc))!==sn.id){flash(sn.id);return;}
  animStep(sn,ni);
}

function animStep(sn,ni){
  const F=6;
  const from=pt(sn.rail[sn.headIdx]),to=pt(sn.rail[ni]);
  let f=0;sn._anim={from,to,t:0};
  (function frame(){
    f++;sn._anim.t=1-Math.pow(1-f/F,3);render();
    if(f<F) requestAnimationFrame(frame);
    else{
      sn._anim=null;sn.headIdx=ni;
      if(sn.headIdx>=sn.rail.length-1){sn.exited=true;checkWin();render();}
      else tryMove(sn); // auto-slide: continua até sair ou ser bloqueada
    }
  })();
}
function pt([r,c]){return center(r,c,G.cs);}

function flash(id){
  G.flashId=id;G.flashFrames=10;
  (function fr(){G.flashFrames--;render();if(G.flashFrames>0) requestAnimationFrame(fr);else G.flashId=-1;})();
}
function checkWin(){
  if(G.snakes.every(s=>s.exited)){
    clearInterval(G.timerH);G.win=true;
    const t=G.timer;
    document.getElementById('win-msg').textContent=
      `Todas escaparam! ⏱ ${0|t/60}:${String(t%60).padStart(2,'0')}`;
    setTimeout(()=>show('ov-win'),450);
  }
}

// ── Renderer ───────────────────────────────────────────────
function render(){
  const{ctx,canvas,cs,R,C}=G;
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // fundo branco
  ctx.fillStyle='#ffffff';ctx.fillRect(0,0,canvas.width,canvas.height);

  // grid sutil
  ctx.strokeStyle='#ebebeb';ctx.lineWidth=1;
  for(let r=0;r<=R;r++){ctx.beginPath();ctx.moveTo(0,r*cs);ctx.lineTo(C*cs,r*cs);ctx.stroke();}
  for(let c=0;c<=C;c++){ctx.beginPath();ctx.moveTo(c*cs,0);ctx.lineTo(c*cs,R*cs);ctx.stroke();}

  for(const sn of G.snakes) if(!sn.exited) drawSnake(sn);
}

function drawSnake(sn){
  const{ctx,cs}=G;
  const cells=bodyOf(sn);
  if(!cells.length) return;

  const isFlash=G.flashId===sn.id&&G.flashFrames%2===0;
  const col=isFlash?'#e74c3c':sn.color;
  const r=cs*.30;

  // pontos (cabeça interpolada se animando)
  const pts=cells.map(([row,c])=>center(row,c,cs));
  if(sn._anim){
    const{from,to,t}=sn._anim;
    pts[pts.length-1]={x:from.x+(to.x-from.x)*t,y:from.y+(to.y-from.y)*t};
  }

  // sombra leve
  ctx.strokeStyle='rgba(0,0,0,0.10)';ctx.lineWidth=r*2+8;
  ctx.lineCap='round';ctx.lineJoin='round';
  path(ctx,pts);

  // corpo
  ctx.strokeStyle=col;ctx.lineWidth=r*2;
  path(ctx,pts);

  // brilho (linha clara no topo)
  ctx.strokeStyle='rgba(255,255,255,0.40)';ctx.lineWidth=r*.7;
  path(ctx,pts);

  // rabo arredondado
  ctx.fillStyle=col;
  ctx.beginPath();ctx.arc(pts[0].x,pts[0].y,r,0,Math.PI*2);ctx.fill();

  // cabeça
  const head=pts[pts.length-1];
  let dx=1,dy=0;
  if(pts.length>1){dx=head.x-pts[pts.length-2].x;dy=head.y-pts[pts.length-2].y;}
  else if(sn.headIdx>0){
    const p=center(sn.rail[sn.headIdx-1][0],sn.rail[sn.headIdx-1][1],cs);
    dx=head.x-p.x;dy=head.y-p.y;
  }
  const dl=Math.hypot(dx,dy)||1;dx/=dl;dy/=dl;
  const nx=-dy,ny=dx;

  ctx.fillStyle=col;
  ctx.beginPath();ctx.arc(head.x,head.y,r*1.12,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.4)';
  ctx.beginPath();ctx.arc(head.x,head.y,r*1.12,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=col;
  ctx.beginPath();ctx.arc(head.x,head.y,r,0,Math.PI*2);ctx.fill();

  // olhos
  eye(ctx,head.x+nx*r*.44,head.y+ny*r*.44,r*.28,dx,dy);
  eye(ctx,head.x-nx*r*.44,head.y-ny*r*.44,r*.28,dx,dy);
}

function path(ctx,pts){
  if(pts.length<2) return;
  ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x,pts[i].y);
  ctx.stroke();
}

function eye(ctx,x,y,r,dx,dy){
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#333';
  ctx.beginPath();ctx.arc(x+dx*r*.3,y+dy*r*.3,r*.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.7)';
  ctx.beginPath();ctx.arc(x-r*.1,y-r*.1,r*.2,0,Math.PI*2);ctx.fill();
}

// ── Utils ──────────────────────────────────────────────────
function show(id){document.getElementById(id).classList.add('show');}
function hide(id){document.getElementById(id).classList.remove('show');}

// ── Boot ───────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded',()=>{
  G.canvas=document.getElementById('c');
  G.ctx=G.canvas.getContext('2d');
  G.canvas.addEventListener('click',onTap);
  G.canvas.addEventListener('touchstart',onTap,{passive:false});
  document.getElementById('btn-next')   .addEventListener('click',()=>startPhase(G.phase+1));
  document.getElementById('btn-retry')  .addEventListener('click',()=>startPhase(G.phase));
  document.getElementById('btn-retry2') .addEventListener('click',()=>startPhase(G.phase));
  document.getElementById('btn-restart').addEventListener('click',()=>startPhase(G.phase));
  window.addEventListener('resize',()=>startPhase(G.phase));
  startPhase(1);
});
</script>
</body>
</html>
